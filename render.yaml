services:
  - type: web
    name: alphatrade-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: NODE_ENV=development npx pnpm@9 install --no-frozen-lockfile && npx pnpm@9 --filter @workspace/api-server run build
    startCommand: npx pnpm@9 --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ANGEL_API_KEY
        sync: false
      - key: ANGEL_CLIENT_CODE
        sync: false
      - key: ANGEL_MPIN
        sync: false
      - key: ANGEL_TOTP_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 8080
    healthCheckPath: /api/health
