openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AlphaTrade Pro API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: recommendations
    description: Stock recommendations
  - name: pnl
    description: P&L tracking
  - name: analytics
    description: Analytics and reporting
  - name: notifications
    description: Push notifications
  - name: subscriptions
    description: Subscription management
  - name: payments
    description: Payment operations
  - name: admin
    description: Admin operations
  - name: referrals
    description: Referral system
  - name: quotes
    description: Daily trading quotes

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── RECOMMENDATIONS ────────────────────────────────────────────────────────
  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List recommendations (latest first)
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter by date (YYYY-MM-DD)
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
        - name: tradeType
          in: query
          schema:
            $ref: "#/components/schemas/TradeType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RecommendationStatus"
        - name: signalType
          in: query
          schema:
            $ref: "#/components/schemas/SignalType"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationList"
        "403":
          description: Subscription required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createRecommendation
      tags: [recommendations]
      summary: Create a stock recommendation (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecommendationRequest"
      responses:
        "201":
          description: Recommendation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommendations/today:
    get:
      operationId: getTodayRecommendations
      tags: [recommendations]
      summary: Get today's recommendations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Today's recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
        "403":
          description: Subscription required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommendations/{id}:
    get:
      operationId: getRecommendation
      tags: [recommendations]
      summary: Get a single recommendation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommendation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateRecommendation
      tags: [recommendations]
      summary: Update a recommendation (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecommendationRequest"
      responses:
        "200":
          description: Updated recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"

    delete:
      operationId: deleteRecommendation
      tags: [recommendations]
      summary: Delete a recommendation (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /recommendations/{id}/pnl:
    put:
      operationId: updateRecommendationPnl
      tags: [pnl]
      summary: Update evening P&L for a recommendation (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePnlRequest"
      responses:
        "200":
          description: Updated recommendation with P&L
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"

  # ─── ANALYTICS ──────────────────────────────────────────────────────────────
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get user dashboard summary stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/performance:
    get:
      operationId: getPerformanceData
      tags: [analytics]
      summary: Monthly performance history (last 12 months)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceData"

  /analytics/win-rate:
    get:
      operationId: getWinRateHistory
      tags: [analytics]
      summary: Win rate history by month
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Win rate history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WinRateHistory"

  # ─── SUBSCRIPTIONS ─────────────────────────────────────────────────────────
  /subscriptions/status:
    get:
      operationId: getSubscriptionStatus
      tags: [subscriptions]
      summary: Get current subscription status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"

  # ─── QUOTES ─────────────────────────────────────────────────────────────────
  /quotes/today:
    get:
      operationId: getTodayQuote
      tags: [quotes]
      summary: Get today's daily quote
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Today's quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuote"
        "404":
          description: No quote posted today
  /quotes:
    post:
      operationId: postDailyQuote
      tags: [quotes]
      summary: Post or update today's quote (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostQuoteRequest"
      responses:
        "200":
          description: Quote updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuote"
        "201":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuote"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    RegisterRequest:
      type: object
      required: [name, phone, password]
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string
        email:
          type: string
          nullable: true
        referralCode:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
        password:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required: [id, name, phone, subscriptionType, isAdmin, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        subscriptionType:
          type: string
          enum: [trial, premium, expired]
        isAdmin:
          type: boolean
        trialExpiryDate:
          type: string
          format: date-time
          nullable: true
        premiumExpiryDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TradeType:
      type: string
      enum: [intraday, swing, positional]
    SignalType:
      type: string
      enum: [BUY, SELL]
    RecommendationStatus:
      type: string
      enum: [active, target_hit, stop_loss_hit, hold, partial_profit, closed]
    Recommendation:
      type: object
      required:
        - id
        - stockName
        - nseSymbol
        - signalType
        - buyPrice
        - targetPrice
        - stopLoss
        - tradeType
        - riskLevel
        - status
        - date
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        stockName:
          type: string
        nseSymbol:
          type: string
        signalType:
          $ref: "#/components/schemas/SignalType"
        buyPrice:
          type: string
        targetPrice:
          type: string
        stopLoss:
          type: string
        tradeType:
          $ref: "#/components/schemas/TradeType"
        riskLevel:
          type: string
        notes:
          type: string
          nullable: true
        screenshotUrl:
          type: string
          nullable: true
        screenshots:
          type: array
          items:
            type: string
          nullable: true
        status:
          $ref: "#/components/schemas/RecommendationStatus"
        exitPrice:
          type: number
          nullable: true
        pnlPercent:
          type: number
          nullable: true
        pnlAbsolute:
          type: number
          nullable: true
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateRecommendationRequest:
      type: object
      required:
        - stockName
        - nseSymbol
        - signalType
        - buyPrice
        - targetPrice
        - stopLoss
        - tradeType
        - riskLevel
      properties:
        stockName:
          type: string
        nseSymbol:
          type: string
        signalType:
          $ref: "#/components/schemas/SignalType"
        buyPrice:
          type: string
        targetPrice:
          type: string
        stopLoss:
          type: string
        tradeType:
          $ref: "#/components/schemas/TradeType"
        riskLevel:
          type: string
        notes:
          type: string
        screenshotUrl:
          type: string
        screenshots:
          type: array
          items:
            type: string
        date:
          type: string
          format: date
    UpdateRecommendationRequest:
      type: object
      properties:
        stockName:
          type: string
        nseSymbol:
          type: string
        signalType:
          $ref: "#/components/schemas/SignalType"
        buyPrice:
          type: string
        targetPrice:
          type: string
        stopLoss:
          type: string
        tradeType:
          $ref: "#/components/schemas/TradeType"
        riskLevel:
          type: string
        notes:
          type: string
        screenshotUrl:
          type: string
        screenshots:
          type: array
          items:
            type: string
        date:
          type: string
          format: date
    UpdatePnlRequest:
      type: object
      required: [exitPrice, status]
      properties:
        exitPrice:
          type: number
        status:
          $ref: "#/components/schemas/RecommendationStatus"
        notes:
          type: string
    DashboardStats:
      type: object
      required: [todayRecommendationsCount, monthlyProfitPercent, totalTrades, winRate, subscriptionType]
      properties:
        todayRecommendationsCount:
          type: number
        monthlyProfitPercent:
          type: number
        totalTrades:
          type: number
        winRate:
          type: number
        subscriptionType:
          type: string
          enum: [trial, premium, expired]
        trialDaysRemaining:
          type: number
          nullable: true
        premiumDaysRemaining:
          type: number
          nullable: true
        bestTrade:
          $ref: "#/components/schemas/Recommendation"
          nullable: true
        worstTrade:
          $ref: "#/components/schemas/Recommendation"
          nullable: true
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
    PerformanceData:
      type: object
      required: [months]
      properties:
        months:
          type: array
          items:
            $ref: "#/components/schemas/PerformanceDataMonth"
    PerformanceDataMonth:
      type: object
      required: [month, totalTrades, wins, losses, winRate, totalPnlPercent, bestTradePercent, worstTradePercent]
      properties:
        month:
          type: string
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        winRate:
          type: number
        totalPnlPercent:
          type: number
        bestTradePercent:
          type: number
        worstTradePercent:
          type: number
    DailyQuote:
      type: object
      required: [id, quote, date]
      properties:
        id:
          type: integer
        quote:
          type: string
        author:
          type: string
          nullable: true
        date:
          type: string
        createdAt:
          type: string
    WinRateHistory:
      type: object
      required: [months]
      properties:
        months:
          type: array
          items:
            type: object
    SubscriptionStatus:
      type: object
      required: [subscriptionType]
      properties:
        subscriptionType:
          type: string
          enum: [trial, premium, expired]
        daysRemaining:
          type: integer
          nullable: true
        isActive:
          type: boolean
        trialStartDate:
          type: string
          nullable: true
        trialExpiryDate:
          type: string
          nullable: true
        premiumExpiryDate:
          type: string
          nullable: true
    PostQuoteRequest:
      type: object
      required: [quote]
      properties:
        quote:
          type: string
        author:
          type: string
    RecommendationList:
      type: object
      required: [data, total, page, limit, totalPages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
