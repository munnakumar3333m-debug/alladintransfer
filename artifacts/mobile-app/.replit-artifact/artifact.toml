kind = "mobile"
previewPath = "/"
title = "AlphaTrade Pro"
version = "1.0.0"
id = "artifacts/mobile-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24382

[services.development]
run = "pnpm --filter @workspace/mobile-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile-app", "run", "serve" ]

[services.env]
PORT = "24382"
BASE_PATH = "/"
